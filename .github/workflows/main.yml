name: OnVersionTag

on:
  push:
    tags:
      - '*'
jobs:
  windows:
    
    strategy:
      matrix:
        configuration: [ Release ]
    runs-on: windows-latest

    env:
      Solution_Name: MsMeeseeks.DIE.slnx
      
    steps:
    - uses: actions/checkout@main
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: 10.0.202
    - run: set DOTNET_CLI_TELEMETRY_OPTOUT=1
    - name: Install dependencies
      run: dotnet restore .\MsMeeseeks.DIE.slnx
    - name: Build
      run: dotnet build .\MsMeeseeks.DIE.slnx --configuration Release --no-restore
    - name: Publish to NuGet
      uses: Yeah69/publish-nuget@main
      with:
        PROJECT_FILE_PATH: Main/Main.csproj
        VERSION_FILE_PATH: Directory.Build.props
        TAG_COMMIT: false
        NUGET_KEY: ${{secrets.NUGET_API_KEY}}
